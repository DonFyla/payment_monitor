# Render Blueprint for Payment Monitor
# This file defines the infrastructure as code for Render deployment
# To deploy: Go to https://dashboard.render.com/blueprints and connect your repo

services:
  # PostgreSQL Database
  - type: postgres
    name: payment-monitor-db
    ipAllowList: []  # Required but empty - allows all connections
    plan: free
    region: oregon  # Change to your preferred region

  # Web Service (Django Application)
  - type: web
    name: payment-monitor
    runtime: docker
    plan: free
    region: oregon  # Change to your preferred region
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Database connection (will be auto-populated by Render)
      - key: DATABASE_URL
        fromDatabase:
          name: payment-monitor-db
          property: connectionString
      
      # Django Secret Key - Generate a new one for production!
      - key: SECRET_KEY
        generateValue: true
      
      # Debug mode - set to False in production
      - key: DEBUG
        value: "False"
      
      # Allowed hosts - Render will provide the URL
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      
      # Python version
      - key: PYTHON_VERSION
        value: "3.11.0"
    
    # Health check path
    healthCheckPath: /admin/login/
    
    # Auto-deploy on git push
    autoDeploy: true
