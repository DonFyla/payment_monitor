# Render Blueprint for Payment Monitor
# This file defines the infrastructure as code for Render deployment
# To deploy: Go to https://dashboard.render.com/blueprints and connect your repo

databases:
  # PostgreSQL Database
  - name: payment-monitor-db
    databaseName: payment_monitor
    user: payment_monitor
    plan: free
    region: oregon
    ipAllowList: []  # Required but empty - allows all connections

services:
  # Web Service (Django Application)
  - type: web
    name: payment-monitor
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      # Database connection (will be auto-populated by Render)
      - key: DATABASE_URL
        fromDatabase:
          name: payment-monitor-db
          property: connectionString
      
      # Django Secret Key - Generate a new one for production!
      - key: SECRET_KEY
        generateValue: true
      
      # Debug mode - set to False in production
      - key: DEBUG
        value: "False"
      
      # Allowed hosts - Render will provide the URL
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      
      # Python version
      - key: PYTHON_VERSION
        value: "3.11.0"
      
      # Superuser credentials - CHANGE THESE!
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true  # Auto-generates a random password
    
    # Health check path
    healthCheckPath: /admin/login/
    
    # Auto-deploy on git push
    autoDeploy: true
